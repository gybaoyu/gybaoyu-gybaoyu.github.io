---
layout: default
---
<article class="card post-article">
  <header class="post-header">
    <a class="back-home-btn" href="{{ '/' | relative_url }}">
    <span class="lang-zh">← 返回首页</span>
    <span class="lang-en">← Back to Home</span>
    </a>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <span class="lang-zh">发布于 {{ page.date | date: "%Y-%m-%d" }}</span>
      <span class="lang-en">Published on {{ page.date | date: "%Y-%m-%d" }}</span>
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
